# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    # Self-hosted seulement sur le repo privé (consomme le quota). Le public
    # leek-wars/leek-wars-generator reste sur ubuntu-latest (gratuit, pas de
    # runner exposé aux forks).
    runs-on: ${{ github.repository == '5pilow/leek-wars-generator-private' && fromJSON('["self-hosted", "leekwars-generator"]') || 'ubuntu-latest' }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'
    - uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.2.1'

    # Image isolate combinée js+python custom (repo privé leek-wars-graal-isolate) :
    # 127 Mo > limite git GitHub, donc distribuée en RELEASE et non commitée
    # (libs/ est gitignoré, build.gradle la référence en files()).
    # Pas de secret sur les PR de forks : l'étape ne tourne pas pour elles (leur build
    # échouera faute de jar, comme avant).
    - name: Download custom isolate image
      if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
      env:
        GH_TOKEN: ${{ secrets.SERVER_DISPATCH_PAT }}
      run: |
        mkdir -p libs
        gh release download v25.1.3-combined-2 -R 5pilow/leek-wars-graal-isolate \
          --pattern 'js-isolate-resources-linux-amd64.jar' --dir libs

    - name: Build
      run: gradle jar
    - name: Unit tests
      run: gradle :test
    - name: Integration tests
      run: |
        java -jar generator.jar --analyze test/ai/basic.leek
        java -jar generator.jar test/scenario/scenario1.json

    - name: Trigger server deploy
      if: github.event_name == 'push'
      run: |
        curl -sf -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.SERVER_DISPATCH_PAT }}" \
          https://api.github.com/repos/5pilow/leek-wars/dispatches \
          -d '{"event_type":"generator-updated"}'
